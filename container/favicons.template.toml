# Favicon cache configuration for the container deployment.
#
# The cache DB lives on the persistent volume mounted at the SearXNG data path
# (/var/cache/searxng) instead of the default ephemeral /tmp. That way resolved
# favicons survive deploys and scale-to-zero cold boots, so a freshly woken box
# serves most icons straight from the warm cache (inlined into the HTML) rather
# than leaning on a cold /favicon_batch round-trip for every result.
#
# The entrypoint copies this file to $__SEARXNG_CONFIG_PATH/favicons.toml on
# boot (build-time writes to that path are discarded because it is a VOLUME).

[favicons]

cfg_schema = 1

[favicons.cache]

db_url = "/var/cache/searxng/faviconcache.db"

# Hard requirement: the DB file must never exceed 950 MB (1 GB volume). Two facts
# make this a function of the *data* cap, not just the cap itself:
#   * LIMIT_TOTAL_BYTES caps blob DATA (SUM(bytes_c)), not the file. SQLite adds
#     page/index/blob_map overhead and a WAL on top.
#   * the file never shrinks on its own — WAL mode, no auto_vacuum — so its size
#     tracks the HIGH-WATER MARK of data ever held, and the cap is only enforced
#     at each maintenance run (overshoot accumulates between runs).
# So we cap data at 850 MB and run maintenance every 20 min: 850 MB data + SQLite
# overhead + a small 20-min overshoot + truncated WAL stays well under 950 MB,
# with no risky in-place VACUUM (which would need ~2x the file size in free
# volume space we don't have). 850 * 1024 * 1024 = 891289600
LIMIT_TOTAL_BYTES = 891289600

# Enforce the cap every 20 min instead of hourly so the between-sweep overshoot
# above LIMIT_TOTAL_BYTES stays small — important because the file keeps the
# high-water mark. 20 * 60 = 1200 sec.
MAINTENANCE_PERIOD = 1200

# Hold resolved favicons for 180 days (default is 30). We never cache the empty
# placeholder anymore, so the cache holds only real icons — which rarely change —
# and a longer hold keeps the warm cache (and thus inlined-into-HTML coverage)
# from decaying on this low-traffic, scale-to-zero box. 180 * 24 * 3600 sec.
HOLD_TIME = 15552000

# Allow favicons up to 40 KB to be cached (default is 20 KB). The new "direct"
# resolver pulls a site's own favicon.ico / <link> icon, which is often a touch
# larger than the aggregators' 32x32 PNGs; without the bump those icons would be
# resolved fresh on every search instead of served from the warm cache. The
# resolver itself rejects anything over 30 KB, so this leaves headroom. 40 * 1024.
BLOB_MAX_BYTES = 40960

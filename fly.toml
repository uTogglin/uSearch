# Fly.io deployment for uSearch (SearXNG fork with the deGoog design).
# Single machine, lowest shared VM, scales to zero when idle.

app = "usearch-degoog"
primary_region = "iad"

# NOTE: no swap. Fly only suspends a Machine when it has no swap configured
# (and <=2gb RAM, no GPU, no schedule), and we want suspend (see [http_service]).
# At 512mb the per-search parsing spike is absorbed by RAM headroom directly and
# rarely needed swap anyway; if OOM kills show up in the logs, bump [[vm]].memory
# to 1024 rather than re-adding swap (swap would silently disable suspend).

[build]
  dockerfile = "container/fly.dockerfile"

[env]
  # Public URL of the instance (the Cloudflare front, NOT the Fly origin).
  # Overrides server.base_url at load time, so _external=True redirects — notably
  # saving preferences — point at Cloudflare. Set here (env, not the settings
  # template) because the config dir persists across deploys: the entrypoint only
  # writes settings.yml when it's missing, so template edits never reach the live
  # file, whereas SEARXNG_BASE_URL is applied on every boot. v4-only clients can't
  # reach *.fly.dev, so a leaked origin redirect is a dead end for them.
  SEARXNG_BASE_URL = "https://search.utoggl.in"

# Persistent volume for the favicon cache (SQLite). Mounted at the SearXNG data
# path so resolved favicons survive deploys and scale-to-zero cold boots instead
# of starting from an empty /tmp every time. The entrypoint chowns it to the
# searxng user on boot. Create once: `fly volumes create faviconcache --size 1`.
[mounts]
  source = "faviconcache"
  destination = "/var/cache/searxng"

[http_service]
  internal_port = 8080
  force_https = true
  # "suspend" snapshots the VM's RAM so a resume is near-instant (~hundreds of
  # ms) instead of a ~5s cold boot — much snappier first search after idle, and
  # billed the same as "stop" (rootfs storage only, no CPU/RAM while suspended).
  # Suspend restores stale TCP sockets in SearXNG's long-lived httpx pools, which
  # would otherwise make every engine hang to timeout (0 results ~12s after
  # wake). A resume watchdog (searx/network/client.py) detects the wake via the
  # NTP wall-clock jump and drops the pools, so the next request dials fresh.
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 40
    hard_limit = 50

[[vm]]
  size = "shared-cpu-1x"
  # 512mb RAM, no swap (swap would disable suspend). ~28 engines across
  # categories (see settings.template.yml); the headroom over 256mb absorbs the
  # per-search parsing spike directly. Must stay <=2gb for suspend to be allowed.
  memory = "512mb"
